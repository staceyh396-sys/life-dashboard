<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>My Life Dashboard</title><style>
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#F7F5F2;color:#2B2B2B;margin:0;padding:16px;max-width:520px;margin:auto;letter-spacing:.1px}
.card{background:#FFFFFF;border-radius:4px;padding:20px 22px;margin:14px 0;border:1px solid #E8E5E0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hero{background:#1C1C1C;color:#F7F5F2}
.hero h2{color:#F7F5F2}
.one{border-left:2px solid #1C1C1C}
h2{font-size:11px;margin:0 0 12px;color:#8A8580;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.date{font-size:12px;opacity:.65;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
ul{margin:0;padding-left:16px;list-style:none}
li{margin:10px 0;line-height:1.5;padding-left:14px;position:relative;font-size:15px}
li::before{content:"—";position:absolute;left:-14px;color:#B5AFA6}
p{margin:4px 0;line-height:1.6;font-size:15px}
.foot{text-align:center;font-size:10px;color:#ADA89F;margin:24px 0;letter-spacing:1.5px;text-transform:uppercase}
.actions{margin:6px 0 4px 0}
.actions a{font-size:10px;color:#8A8580;text-decoration:none;margin-right:16px;
letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #D8D3CB;padding-bottom:2px}
#gate{display:flex;flex-direction:column;align-items:center;margin-top:30vh}
#gate h2{color:#1C1C1C;font-size:13px;letter-spacing:3px;margin-bottom:20px}
#gate input{font-size:16px;padding:14px;border-radius:2px;border:1px solid #D8D3CB;width:220px;text-align:center;background:#FFFFFF}
#gate button{margin-top:14px;font-size:11px;padding:12px 32px;border-radius:2px;border:none;
background:#1C1C1C;color:#F7F5F2;letter-spacing:2px;text-transform:uppercase}
</style></head><body>

async function decrypt(pw){
 const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
 const salt=raw.slice(0,16),nonce=raw.slice(16,28),ct=raw.slice(28);
 const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
 const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},key,ct);
 return new TextDecoder().decode(pt);}
async function go(){
 const pw=document.getElementById("pw").value;
 try{const html=await decrypt(pw);
  sessionStorage.setItem("dpw",pw);
  document.getElementById("gate").style.display="none";
  document.getElementById("content").innerHTML=html;
 }catch(e){document.getElementById("err").textContent="Wrong password";}}
window.onload=async()=>{const s=sessionStorage.getItem("dpw");
 if(s){document.getElementById("pw").value=s;go();}};
document.getElementById("pw").addEventListener("keyup",e=>{if(e.key==="Enter")go();});
</script></body></html>
